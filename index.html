<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    /* 🔥 Background Gradient */
    height:100vh;
    background: linear-gradient(135deg, #8b0000, #ff4d4d, #f3f3f3);
    display:flex;
    flex-direction:column;
}
/* TOP HEADER */
.header{
    width:100%;
    height:90px;
    background:rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);
}
/* CENTER BOX */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}
.login-box{
    width:430px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}
/* LOGO */
.logo{
    width:120px;
    display:block;
    margin:0 auto 10px auto;
}
/* TEXT */
h1{
    text-align:center;
    color:#8b0000;
    font-size:30px;
}
h3{
    text-align:center;
    color:gray;
    margin-bottom:20px;
    font-weight:normal;
}
/* INPUT */
label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}
input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}
/* OPTIONS */
.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    font-size:14px;
}
.options a{
    text-decoration:none;
    color:#8b0000;
}
/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:18px;
    background:#8b0000;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#a00000;
}
.login2{
    background:white;
    color:#8b0000;
    border:2px solid #8b0000;
}
.or{
    text-align:center;
    margin:15px 0;
    color:gray;
}
/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    color:white;
    font-size:14px;
}
</style>
</head>
<body>
<div class="header"></div>
<div class="container">
    <div class="login-box">
        <!-- ✅ FIXED LOGO PATH -->
        <img src="images (1).jpg" class="logo">
        <h1>ADHIPARASAKTHI</h1>
        <h3>APEC Login</h3>
        <label>Username</label>
        <input type="text" placeholder="Enter your username">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
        <div class="options">
            <label><input type="checkbox" style="width:auto;"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>
        <button>Login</button>
        <div class="or">OR</div>
        <button class="login2">Login with APEC Account</button>
    </div>
</div>
<div class="footer">
© 2025 Adhiparasakthi Engineering College. All Rights Reserved.
</div>
</body>
